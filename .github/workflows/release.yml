name: Release DMG

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-dmg:
    name: Build Safe Screen DMG
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify tag matches VERSION
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          if [ "$GITHUB_REF_NAME" != "v$version" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match VERSION file (expected v$version)"
            exit 1
          fi
          echo "Tag $GITHUB_REF_NAME matches VERSION $version"

      - name: Run tests
        run: swift test

      - name: Build DMG
        run: bash ./scripts/build_dmg.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: Safe-Screen-DMG
          path: dist/*.dmg
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/*.dmg \
            --title "Safe Screen $GITHUB_REF_NAME" \
            --notes "Release build for Safe Screen." \
            --verify-tag
